name: Generate changelog
on:
  release:
    types: [created, edited]

jobs:
  auto-changelog-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: BobAnkh/auto-generate-changelog@v1.3.1
        with:
          REPO_NAME: "un-mec-paumer/todo-api-node"
          ACCESS_TOKEN: ${{secrets.GITHUB_TOKEN}}
          PATH: "CHANGELOG.md"
          COMMIT_MESSAGE: "docs(CHANGELOG): update release notes"
          TYPE: "feat:Feature,fix:Bug Fixes,docs:Documentation,refactor:Refactor,perf:Performance Improvements,test:Test"