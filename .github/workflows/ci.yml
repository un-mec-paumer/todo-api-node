name: CI Pipeline

on:
  push:
    # branches: [main, develop, feature/reusable-workflow]
    branches: [feature/reusable-workflows]
  pull_request:
    branches: [main, develop]

jobs:
  # Notify Discord
  discord-notify:
    uses: ./.github/workflows/discord.yml

  # ────────── Lint ──────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ────────── Tests & Coverage ──────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ────────── Docker Build ──────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest

  # ────────── Deploy Staging ──────────
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Staging
        run: docker run -d -p 3001:3000 -e NODE_ENV=staging -e DB_PASSWORD=${{ secrets.DB_PASSWORD_STAGING }} -e SECRET_KEY=${{ secrets.SECRET_KEY_STAGING }} -e API_KEY=${{ secrets.API_KEY_STAGING }} ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest

  # ────────── Deploy Production ──────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Production
        run: docker run -d -p 3000:3000 -e NODE_ENV=production -e DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }} -e SECRET_KEY=${{ secrets.SECRET_KEY_PROD }} -e API_KEY=${{ secrets.API_KEY_PROD }} ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
